# Configuration for Jarvis Home Automation System
# Copy this file to config.yaml and customize it for your setup

# Logging configuration
logging:
  level: INFO  # DEBUG, INFO, WARNING, ERROR, CRITICAL
  format: '%(asctime)s - %(name)s - %(levelname)s - %(message)s'

# Data collection settings
data_collection:
  interval: 60  # How often to collect data (in seconds)
  storage_path: data/collected  # Where to store collected data

# Collector configurations
collectors:
  # Shelly smart home devices
  shelly:
    enabled: false
    api_key: ''  # Your Shelly API key (if using cloud API)
    poll_interval: 60
    devices:
      # - id: 'device_id_1'
      #   name: 'Living Room Switch'
      #   ip: '192.168.1.100'
      # - id: 'device_id_2'
      #   name: 'Bedroom Sensor'
      #   ip: '192.168.1.101'
  
  # TP-Link Tapo devices
  tapo:
    enabled: false
    username: ''  # Your Tapo account username
    password: ''  # Your Tapo account password
    devices:
      # - id: 'device_id_1'
      #   name: 'Living Room Bulb'
      #   ip: '192.168.1.110'
      #   model: 'L530'
      # - id: 'device_id_2'
      #   name: 'Smart Plug'
      #   ip: '192.168.1.111'
      #   model: 'P110'
  
  # Amazon Alexa devices
  alexa:
    enabled: false
    access_token: ''  # Your Alexa API access token
    collect_routines: false  # Whether to collect routine information
    devices:
      # - id: 'device_id_1'
      #   name: 'Living Room Echo'
      # - id: 'device_id_2'
      #   name: 'Bedroom Echo Dot'
  
  # Windows system monitoring
  windows:
    enabled: false
    host: localhost  # Hostname or IP of Windows machine
    collect_processes: false  # Whether to collect process information
    collect_network: true  # Whether to collect network statistics
  
  # macOS system monitoring
  mac:
    enabled: false
    host: localhost  # Hostname or IP of Mac machine
    collect_processes: false  # Whether to collect process information
    collect_network: true  # Whether to collect network statistics
